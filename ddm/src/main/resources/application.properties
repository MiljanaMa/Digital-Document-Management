# SPRING
spring.application.name=ddm-backend
server.port=${API_PORT:8088}
server.address=0.0.0.0

# ACTUATOR / METRICS (scraped by Prometheus at /actuator/prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# DATA SOURCE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/DDMDemoDatabase
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ELASTICSEARCH
elasticsearch.host=${ES_HOST:localhost}
elasticsearch.port=${ES_PORT:9200}
elasticsearch.userName=${ES_USERNAME:}
elasticsearch.password=${ES_PASSWORD:}

# DOCUMENT STORAGE - MINIO
spring.minio.url=http://${MINIO_HOST:localhost}:9000
spring.minio.bucket=${MINIO_BUCKET:ddm-bucket}
spring.minio.access-key=${MINIO_ACCESS_KEY:}
spring.minio.secret-key=${MINIO_SECRET_KEY:}

# LOGGING
# Log file configuration
logging.file.name=C:/Users/Miljana/Documents/UDD/Digital-Document-Management/logstash-ingest-data/application.log
#logging.level.com.example=DEBUG #(optional)

cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

rsa.public-key=${RSA_PUBLIC_KEY:file:/run/secrets/jwt/public-key.pem}

location.api.key=${LOCATION_API_KEY:}
