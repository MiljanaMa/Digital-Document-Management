version: "3.7"
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: ddmdemo-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - ddmdemo-network
    command: >
      bash -c "
        if ! bin/elasticsearch-plugin list | grep -q 'analysis-icu'; then
          bin/elasticsearch-plugin install --batch analysis-icu
        fi
        exec bin/elasticsearch
      "
    restart: always

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.2
    container_name: ddmdemo-logstash
    ports:
      - "5044:5044"
    volumes:
      - "./logstash-ingest-data/:/usr/share/logstash/ingest_data/"
      - "./logstash-config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf"
    restart: always
    networks:
      - ddmdemo-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: ddmdemo-kibana
    ports:
      - "5601:5601"
    networks:
      - ddmdemo-network
    restart: always

  minio:
    image: quay.io/minio/minio:latest
    container_name: ddmdemo-minio
    ports:
      - 9000:9000
      - 9090:9090
    environment:
      - MINIO_ROOT_USER=ROOTUSER
      - MINIO_ROOT_PASSWORD=CHANGEME123
    command: server /data --console-address ":9090"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/ready" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - minio-data:/data
    restart: always
    networks:
      - ddmdemo-network

  init-minio:
    image: minio/mc:latest
    container_name: ddmdemo-init-minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '[init-minio] Setting alias...';
        mc alias set myminio http://minio:9000 ROOTUSER CHANGEME123;
        echo '[init-minio] Creating bucket...';
        mc mb myminio/ddm-bucket || echo '[init-minio] Bucket already exists';
        echo '[init-minio] Done.';
      "
    networks:
      - ddmdemo-network

networks:
  ddmdemo-network:
    name: ddmdemo-network

volumes:
  minio-data: